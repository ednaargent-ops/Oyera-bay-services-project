<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technician Registration</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">Oyera Services Bay</a>
  </div>
</nav>

<!-- FORM SECTION -->
<section class="py-5">
  <div class="container">

    <div class="row justify-content-center">
      <div class="col-md-9">

        <div class="card border-0 shadow-sm p-4">

          <h3 class="text-center fw-bold mb-2">Technician Registration</h3>
          <p class="text-center mb-4">
            Join our network of verified mechanics and start receiving jobs 🔧
          </p>

          <form>

            <!-- PERSONAL INFO -->
            <div class="row g-3">

              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Enter full name">
              </div>

              <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-control" placeholder="+256...">
              </div>

              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="email@example.com">
              </div>

              <div class="col-md-6">
                <label class="form-label">National ID / License Number</label>
                <input type="text" class="form-control" placeholder="ID or certification number">
              </div>

              <hr class="my-4">

              <!-- SKILLS -->
              <div class="col-12">
                <label class="form-label">Specialization</label>
                <select class="form-select">
                  <option selected>Select your main skill</option>
                  <option>Engine Specialist</option>
                  <option>Brake Systems</option>
                  <option>Electrical Systems</option>
                  <option>Diagnostics</option>
                  <option>Tyre & Alignment</option>
                  <option>General Mechanic</option>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label">Other Skills</label>
                <input type="text" class="form-control" placeholder="e.g. Hybrid cars, AC repair...">
              </div>

              <hr class="my-4">

              <!-- LOCATION -->
              <div class="col-md-6">
                <label class="form-label">Current Location</label>
                <input type="text" class="form-control" placeholder="City / Area / Landmark">
              </div>

              <div class="col-md-6">
                <label class="form-label">Availability</label>
                <select class="form-select">
                  <option selected>Select availability</option>
                  <option>Full-time</option>
                  <option>Part-time</option>
                  <option>Emergency Only</option>
                </select>
              </div>

              <hr class="my-4">

              <!-- EXPERIENCE -->
              <div class="col-md-6">
                <label class="form-label">Years of Experience</label>
                <input type="number" class="form-control" placeholder="e.g. 3">
              </div>

              <div class="col-md-6">
                <label class="form-label">Workshop Name (if any)</label>
                <input type="text" class="form-control" placeholder="Optional">
              </div>

              <div class="col-12">
                <label class="form-label">Short Bio</label>
                <textarea class="form-control" rows="4" placeholder="Tell us about your experience..."></textarea>
              </div>

              <!-- SUBMIT -->
              <div class="col-12 mt-3">
                <button type="submit" class="btn btn-primary w-100 btn-lg">
                  Submit Application
                </button>
              </div>

            </div>

          </form>

        </div>

      </div>
    </div>

  </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
